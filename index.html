<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPR 刷题系统 - 法与科技实验室</title>
    <style>
        :root {
            --primary: #2563eb; --primary-hover: #1d4ed8; --bg: #f1f5f9; --card-bg: #ffffff;
            --text: #0f172a; --text-secondary: #64748b; --border: #e2e8f0;
            --success: #22c55e; --success-bg: #f0fdf4; --error: #ef4444; --error-bg: #fef2f2;
            --radius: 16px; --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        body.dark-mode {
            --primary: #60a5fa; --primary-hover: #3b82f6; --bg: #0f172a; --card-bg: #1e293b;
            --text: #f8fafc; --text-secondary: #94a3b8; --border: #334155;
            --success: #4ade80; --success-bg: #064e3b; --error: #f87171; --error-bg: #7f1d1d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; transition: 0.3s; }
        header { background: var(--card-bg); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        main { flex: 1; width: 100%; max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--border); }
        #setup-area, #quiz-area, #result-area { display: none; }
        .active { display: block !important; }
        textarea { width: 100%; height: 200px; margin: 1rem 0; padding: 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg); color: var(--text); resize: vertical; }
        .scenario { background: var(--bg); padding: 1.25rem; border-left: 4px solid var(--primary); border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--text-secondary); white-space: pre-line; }
        .question-text { font-size: 1.15rem; font-weight: 700; margin-bottom: 1.5rem; }
        .option { display: flex; padding: 1rem; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; margin-bottom: 0.75rem; transition: 0.2s; }
        .option:hover:not(.disabled) { border-color: var(--primary); background: var(--bg); }
        .option.selected { border-color: var(--primary); background: rgba(37, 99, 235, 0.1); }
        .option.correct { border-color: var(--success); background: var(--success-bg); }
        .option.wrong { border-color: var(--error); background: var(--error-bg); }
        .option.disabled { cursor: default; pointer-events: none; }
        .option-tag { font-weight: 800; margin-right: 1rem; }
        .explanation { margin-top: 1.5rem; padding: 1.2rem; background: var(--bg); border-radius: 10px; display: none; }
        .show { display: block !important; }
        button { cursor: pointer; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; display: inline-flex; align-items: center; gap: 0.5rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 1rem 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .review-item { padding: 1rem; border-radius: 8px; margin-bottom: 1rem; background: var(--bg); border-left: 4px solid var(--border); text-align: left; }
        .is-correct { border-left-color: var(--success); }
        .is-wrong { border-left-color: var(--error); }
        .score-circle { width: 100px; height: 100px; border-radius: 50%; border: 8px solid var(--primary); margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 800; }
    </style>
</head>
<body>

<header>
    <h1>GDPR Master Quiz</h1>
    <div style="display: flex; gap: 0.5rem;">
        <button class="btn-outline" onclick="toggleView('setup')">⚙️ 题库</button>
        <button onclick="toggleTheme()">🌓</button>
    </div>
</header>

<main>
    <div id="setup-area" class="card">
        <h2>📥 导入题库</h2>
        <textarea id="raw-input" placeholder="支持 SCENARIO(1-3) 格式题干..."></textarea>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-outline" onclick="loadDemo()">演示题目</button>
            <button class="btn-primary" onclick="startQuiz()">开始刷题</button>
        </div>
    </div>

    <div id="quiz-area">
        <div style="display: flex; justify-content: space-between; font-size: 0.9rem;">
            <span id="progress-text"></span>
            <span id="current-accuracy" style="color: var(--primary); font-weight: bold;"></span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="card">
            <div id="scenario-box" class="scenario"></div>
            <div class="question-text" id="question-text"></div>
            <div id="options-container"></div>
            <div id="explanation-box" class="explanation">
                <div id="answer-display" style="font-weight: bold; margin-bottom: 0.5rem;"></div>
                <div id="explanation-text" style="font-size: 0.9rem; color: var(--text-secondary);"></div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-outline" id="prev-btn" onclick="changeQuestion(-1)">⬅️ 上一题</button>
            <button class="btn-primary" id="next-btn" onclick="changeQuestion(1)">下一题 ➡️</button>
        </div>
    </div>

    <div id="result-area" class="card" style="text-align: center;">
        <h2>🎉 练习完成！</h2>
        <div class="score-circle" id="final-score">0%</div>
        <div style="margin-bottom: 2rem; color: var(--text-secondary);">
            共 <span id="res-total"></span> 题 | 答对 <span id="res-correct"></span> 题
        </div>
        <button class="btn-primary" onclick="restartQuiz()">🔄 重新开始</button>
        <div id="review-list" style="margin-top: 2rem;"></div>
    </div>
</main>

<script>
    let questions = [];
    let currentIndex = 0;
    let answers = {};
    let demoData = `SCENARIO(1-2)\nAnna works at a University. She loses a laptop with unencrypted student data.\n\n1. What is the first step Anna should take?\nA. Inform the students\nB. Report to the DPO\nC. Format the laptop\nD. Resign\nAnswer: B\nExplanation: 根据GDPR，发生数据泄露应立即上报DPO。\n\n2. This incident is a breach of:\nA. Confidentiality\nB. Availability\nC. Integrity\nD. All of above\nAnswer: A\nExplanation: 数据丢失导致非授权访问风险。`;

    function parseText(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let currentScenario = "";
        let curr = null;

        const rgxScenario = /^SCENARIO/i;
        const rgxStart = /^\s*(\d+)[\.\、]\s+(.+)/;
        const rgxOpt = /^\s*([A-D])[\.\、]\s+(.+)/;
        const rgxAns = /(?:Answer|Ans|答案)[:：]\s*([A-D])/i;

        for (let i = 0; i < lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            if (rgxScenario.test(line)) {
                currentScenario = line + "\n";
                for (let j = i + 1; j < lines.length; j++) {
                    if (rgxStart.test(lines[j])) { i = j - 1; break; }
                    currentScenario += lines[j] + "\n";
                }
                continue;
            }

            let matchQ = line.match(rgxStart);
            if (matchQ) {
                if (curr) result.push(curr);
                curr = { id: matchQ[1], text: matchQ[2], options: {}, scenario: currentScenario, explanation: "" };
                continue;
            }

            if (!curr) continue;

            let matchOpt = line.match(rgxOpt);
            if (matchOpt && !curr.answer) {
                curr.options[matchOpt[1]] = matchOpt[2];
            } else if (rgxAns.test(line)) {
                curr.answer = line.match(rgxAns)[1].toUpperCase();
            } else {
                curr.explanation += line + " ";
            }
        }
        if (curr) result.push(curr);
        return result;
    }

    function toggleView(view) {
        ['setup-area', 'quiz-area', 'result-area'].forEach(id => {
            document.getElementById(id).classList.remove('active');
        });
        document.getElementById(view + '-area').classList.add('active');
    }

    function startQuiz() {
        const raw = document.getElementById('raw-input').value;
        questions = parseText(raw);
        if (questions.length === 0) return alert("无法解析题目，请检查格式");
        localStorage.setItem('gdpr_quiz_data', raw);
        currentIndex = 0; answers = {};
        toggleView('quiz');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        const uAns = answers[currentIndex];
        
        const sBox = document.getElementById('scenario-box');
        if (q.scenario) { sBox.innerText = q.scenario; sBox.style.display = 'block'; }
        else { sBox.style.display = 'none'; }

        document.getElementById('question-text').innerText = `${q.id}. ${q.text}`;
        document.getElementById('progress-text').innerText = `题目 ${currentIndex + 1} / ${questions.length}`;
        document.getElementById('progress-fill').style.width = `${((currentIndex+1)/questions.length)*100}%`;

        const cont = document.getElementById('options-container');
        cont.innerHTML = '';
        ['A','B','C','D'].forEach(opt => {
            if (!q.options[opt]) return;
            const div = document.createElement('div');
            div.className = 'option' + (uAns ? ' disabled' : '');
            if (uAns) {
                if (opt === q.answer) div.classList.add('correct');
                else if (opt === uAns) div.classList.add('wrong');
                if (opt === uAns) div.classList.add('selected');
            }
            div.onclick = () => { if(!answers[currentIndex]) { answers[currentIndex] = opt; renderQuestion(); }};
            div.innerHTML = `<span class="option-tag">${opt}</span>${q.options[opt]}`;
            cont.appendChild(div);
        });

        const expBox = document.getElementById('explanation-box');
        if (uAns) {
            expBox.classList.add('show');
            document.getElementById('answer-display').innerHTML = uAns === q.answer ? "✅ 正确" : `❌ 错误，正确答案是 ${q.answer}`;
            document.getElementById('explanation-text').innerText = q.explanation.replace(/explanation|解析/i, '').trim();
        } else expBox.classList.remove('show');

        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').innerText = currentIndex === questions.length - 1 ? "完成" : "下一题 ➡️";
        updateAccuracy();
    }

    function updateAccuracy() {
        let correct = 0, answered = Object.keys(answers).length;
        Object.keys(answers).forEach(idx => { if(answers[idx] === questions[idx].answer) correct++; });
        document.getElementById('current-accuracy').innerText = `正确率: ${answered ? Math.round(correct/answered*100) : 0}%`;
    }

    function changeQuestion(n) {
        if (currentIndex + n >= 0 && currentIndex + n < questions.length) {
            currentIndex += n; renderQuestion();
        } else if (n > 0) showResults();
    }

    function showResults() {
        toggleView('result');
        let correct = 0;
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '<h3 style="margin-bottom:1rem">错题复盘 (点击可跳回查看)</h3>';

        questions.forEach((q, idx) => {
            const uAns = answers[idx] || "未答";
            const isCorrect = uAns === q.answer;
            if (isCorrect) correct++;

            const div = document.createElement('div');
            div.className = `review-item ${isCorrect ? 'is-correct' : 'is-wrong'}`;
            div.innerHTML = `<strong>${idx+1}. ${q.text.substring(0,30)}...</strong><br>
                             <small>你的: ${uAns} | 正确: ${q.answer}</small>`;
            div.onclick = () => { currentIndex = idx; toggleView('quiz'); renderQuestion(); };
            reviewList.appendChild(div);
        });

        const score = Math.round(correct / questions.length * 100);
        document.getElementById('final-score').innerText = score + "%";
        document.getElementById('res-total').innerText = questions.length;
        document.getElementById('res-correct').innerText = correct;
    }

    function loadDemo() { document.getElementById('raw-input').value = demoData; }
    function restartQuiz() { currentIndex = 0; answers = {}; toggleView('setup'); }
    function toggleTheme() { document.body.classList.toggle('dark-mode'); }
    window.onload = () => {
        const saved = localStorage.getItem('gdpr_quiz_data');
        if (saved) { document.getElementById('raw-input').value = saved; startQuiz(); }
        else toggleView('setup');
    };
</script>
</body>
</html>
