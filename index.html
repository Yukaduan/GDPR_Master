<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDPR 刷题系统 - 法与科技实验室</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --success: #22c55e;
            --success-bg: #f0fdf4;
            --error: #ef4444;
            --error-bg: #fef2f2;
            --radius: 16px;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        body.dark-mode {
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
            --border: #334155;
            --success: #4ade80;
            --success-bg: #064e3b;
            --error: #f87171;
            --error-bg: #7f1d1d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }

        /* Header */
        header { background: var(--card-bg); padding: 1rem 2rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); background-color: rgba(255, 255, 255, 0.9); }
        body.dark-mode header { background-color: rgba(30, 41, 59, 0.9); }
        h1 { font-size: 1.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        
        /* Main Layout */
        main { flex: 1; width: 100%; max-width: 800px; margin: 2rem auto; padding: 0 1.5rem; }

        /* Card Styles */
        .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 2rem; border: 1px solid var(--border); transition: transform 0.3s ease, opacity 0.3s ease; }
        
        /* Import Area */
        #setup-area { display: none; }
        #setup-area.active { display: block; animation: fadeIn 0.4s ease; }
        textarea { width: 100%; height: 200px; margin: 1rem 0; padding: 1rem; border-radius: 8px; border: 2px solid var(--border); background: var(--bg); color: var(--text); font-family: monospace; resize: vertical; outline: none; transition: border-color 0.2s; }
        textarea:focus { border-color: var(--primary); }

        /* Quiz Area */
        #quiz-area { display: none; }
        #quiz-area.active { display: block; animation: slideUp 0.4s ease; }

        /* Result Area */
        #result-area { display: none; text-align: center; }
        #result-area.active { display: block; animation: zoomIn 0.4s ease; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: conic-gradient(var(--primary) 0%, var(--border) 0%); margin: 0 auto 2rem; display: flex; align-items: center; justify-content: center; position: relative; transition: background 1s ease-out; }
        .score-circle::before { content: ''; position: absolute; width: 130px; height: 130px; background: var(--card-bg); border-radius: 50%; }
        .score-number { position: relative; font-size: 2.5rem; font-weight: 800; color: var(--primary); }
        .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-bottom: 2rem; }
        .result-item { background: var(--bg); padding: 1rem; border-radius: 8px; }
        .result-label { font-size: 0.9rem; color: var(--text-secondary); }
        .result-value { font-size: 1.5rem; font-weight: 700; }

        /* Scenario & Question */
        .scenario { background: var(--bg); padding: 1.25rem; border-left: 4px solid var(--primary); border-radius: 4px; margin-bottom: 1.5rem; font-size: 0.95rem; color: var(--text-secondary); white-space: pre-line; }
        .question-text { font-size: 1.2rem; font-weight: 700; margin-bottom: 1.5rem; white-space: pre-line; line-height: 1.5; }

        /* Options */
        .option { display: flex; padding: 1rem 1.25rem; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; align-items: flex-start; margin-bottom: 0.75rem; position: relative; overflow: hidden; }
        .option:hover:not(.disabled) { border-color: var(--primary); background: var(--bg); transform: translateY(-2px); }
        .option.selected { border-color: var(--primary); background: rgba(37, 99, 235, 0.05); }
        .option.correct { border-color: var(--success); background: var(--success-bg); }
        .option.wrong { border-color: var(--error); background: var(--error-bg); }
        .option-tag { font-weight: 800; margin-right: 1rem; min-width: 25px; }
        .option.disabled { cursor: default; pointer-events: none; }

        /* Explanation */
        .explanation { margin-top: 1.5rem; padding: 1.5rem; background: var(--bg); border-radius: 10px; border: 1px solid var(--border); display: none; }
        .explanation.show { display: block; animation: fadeIn 0.5s ease; }
        
        /* Buttons */
        button { cursor: pointer; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; font-weight: 600; transition: all 0.2s; font-size: 0.95rem; display: inline-flex; align-items: center; gap: 0.5rem; }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text-secondary); }
        .btn-outline:hover { border-color: var(--text-secondary); color: var(--text); }
        .btn-icon { padding: 0.5rem; font-size: 1.2rem; background: transparent; color: var(--text); }

        /* Progress Bar */
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; margin: 1.5rem 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Footer */
        footer { text-align: center; padding: 2rem; color: var(--text-secondary); font-size: 0.85rem; margin-top: auto; border-top: 1px solid var(--border); background: var(--card-bg); }
        .lab-logo { font-weight: 700; color: var(--primary); text-decoration: none; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* Mobile */
        @media (max-width: 600px) {
            .card { padding: 1.25rem; }
            header { padding: 1rem; }
            h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>GDPR Master Quiz</h1>
    <div style="display: flex; gap: 0.5rem;">
        <button class="btn-outline" onclick="toggleView('setup')" style="font-size: 0.8rem;">⚙️ 题库</button>
        <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<main>
    <!-- 1. 设置/导入区域 -->
    <div id="setup-area" class="card">
        <h2>📥 导入题库</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">请将题目文本（包含题号、选项、Answer、Explanation）完整粘贴到下方：</p>
        <textarea id="raw-input" placeholder="例如：
1. Question text...
A. Option...
B. Option...
Answer: A
Explanation: ..."></textarea>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem;">
            <span id="parse-status" style="font-size: 0.85rem; color: var(--text-secondary);"></span>
            <div style="display: flex; gap: 10px;">
                <button class="btn-outline" onclick="loadDemo()">重置为演示题</button>
                <button class="btn-primary" onclick="startQuiz()">开始刷题</button>
            </div>
        </div>
    </div>

    <!-- 2. 答题区域 -->
    <div id="quiz-area">
        <div style="display: flex; justify-content: space-between; align-items: center; color: var(--text-secondary); font-size: 0.9rem;">
            <span id="progress-text">题目 1 / 10</span>
            <span>正确率: <span id="current-accuracy" style="font-weight: bold; color: var(--primary);">0%</span></span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
        </div>

        <div class="card">
            <div id="scenario-box" class="scenario" style="display:none;"></div>
            <div class="question-text" id="question-text">Loading...</div>
            <div id="options-container"></div>

            <div class="explanation" id="explanation-box">
                <div style="margin-bottom: 0.5rem; font-weight: 700; color: var(--success);" id="answer-display"></div>
                <div style="font-weight: 700; margin-bottom: 0.5rem;">📝 解析：</div>
                <div id="explanation-text" style="color: var(--text-secondary); white-space: pre-line;"></div>
            </div>
        </div>

        <div style="display: flex; justify-content: space-between;">
            <button class="btn-outline" id="prev-btn" onclick="changeQuestion(-1)">⬅️ 上一题</button>
            <button class="btn-primary" id="next-btn" onclick="changeQuestion(1)">下一题 ➡️</button>
        </div>
    </div>

    <!-- 3. 结算区域 -->
    <div id="result-area" class="card">
        <h2>🎉 练习完成！</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">恭喜你完成了所有题目</p>
        
        <div class="score-circle" id="final-score-circle">
            <div class="score-number" id="final-score-number">0%</div>
        </div>

        <div class="result-grid">
            <div class="result-item">
                <div class="result-label">总题数</div>
                <div class="result-value" id="res-total">0</div>
            </div>
            <div class="result-item">
                <div class="result-label">答对</div>
                <div class="result-value" id="res-correct" style="color: var(--success);">0</div>
            </div>
            <div class="result-item">
                <div class="result-label">答错</div>
                <div class="result-value" id="res-wrong" style="color: var(--error);">0</div>
            </div>
            <div class="result-item">
                <div class="result-label">未答</div>
                <div class="result-value" id="res-unanswered">0</div>
            </div>
        </div>

        <button class="btn-primary" onclick="restartQuiz()">🔄 重新开始</button>
    </div>
</main>

<footer>
    由 <a href="#" class="lab-logo">@法与科技实验室</a> 开发
</footer>

<script>
    // --- Data & State ---
    let questions = [];
    let currentIndex = 0;
    let answers = {}; // { 0: 'A', 1: 'C' }
    let demoData = `1. Which statement is correct when considering the right to privacy under Article 8 of the European Convention on Human Rights (ECHR)?
A. The right to privacy is an absolute right
B. The right to privacy has to be balanced against other rights under the ECHR
C. The right to freedom of expression under Article 10 of the ECHR will always override the right to privacy
D. The right to privacy protects the right to hold opinions and to receive and impart ideas without interference
Answer:B
Explanation
《欧洲人权公约》第8条保护私人和家庭生活、住宅和通信受到尊重的权利。然而，这项权利并不是绝对的，必须与其他权利平衡。

2. A key component of the OECD Guidelines is the “Individual Participation Principle”. What parts of the General Data Protection Regulation (GDPR) provide the closest equivalent to that principle?
A. The lawful processing criteria stipulated by Articles 6 to 9
B. The information requirements set out in Articles 13 and 14
C. The breach notification requirements specified in Articles 33 and 34
D. The rights granted to data subjects under Articles 12 to 22
Answer:D
Explanation
OECD 的“个人参与原则”强调了个人对自己数据的控制权。GDPR 第12-22条的数据主体权利最直接地体现了这一点。

SCENARIO(5-7)
Anna and Frank both work at Granchester University. Frank wants to investigate his students' performance. He transfers unencrypted data to his laptop and loses it.

5. Before Anna determines whether Frank's performance database is permissible,what additional information does she need?
A. More information about Frank's data protection training.
B. More information about the extent of the information loss.
C. More information about the algorithm Frank used.
D. More information about what students have been told and how the research will be used.
Answer:D
Explanation
透明度原则要求数据主体知晓处理目的。Anna需要确认学生是否被告知。`;

    // --- Parser ---
    function parseText(text) {
        const lines = text.split(/\r?\n/);
        const result = [];
        let curr = null;
        let scenario = "";

        const rgxStart = /^\s*(\d+)[\.\、]\s+(.+)/;
        const rgxOpt = /^\s*([A-D])[\.\、]\s+(.+)/;
        const rgxAns = /(?:Answer|Ans|答案)[:：]\s*([A-D])/i;
        
        for (let i=0; i<lines.length; i++) {
            let line = lines[i].trim();
            if (!line) continue;

            // Scenario detection
            if (/^SCENARIO/i.test(line)) {
                scenario = line + "\n";
                // Look ahead for scenario content
                for(let j=i+1; j<lines.length; j++){
                    if(rgxStart.test(lines[j])) { i=j-1; break; }
                    scenario += lines[j] + "\n";
                }
                continue;
            }

            // New Question
            let matchQ = line.match(rgxStart);
            if (matchQ) {
                if (curr) result.push(curr);
                curr = { 
                    id: matchQ[1], 
                    text: matchQ[2], 
                    options: {}, 
                    scenario: scenario.trim(), 
                    explanation: "" 
                };
                continue;
            }

            if (!curr) continue;

            // Option
            let matchOpt = line.match(rgxOpt);
            if (matchOpt && !curr.answer) {
                curr.options[matchOpt[1]] = matchOpt[2];
                continue;
            }

            // Answer
            let matchAns = line.match(rgxAns);
            if (matchAns) {
                curr.answer = matchAns[1].toUpperCase();
                // Try capture explanation on same line
                if (line.toLowerCase().includes("explanation")) {
                    let split = line.split(/explanation|解析/i);
                    if(split[1]) curr.explanation = split[1];
                }
                continue;
            }

            // Explanation block
            if (/^Explanation|^解析/i.test(line)) {
                let content = line.replace(/^Explanation|^解析/i, '').trim();
                curr.explanation += content + "\n";
                continue;
            }

            // Append content
            if (curr.answer) {
                curr.explanation += line + "\n";
            } else {
                // Append to option or text
                let keys = Object.keys(curr.options);
                if (keys.length > 0) curr.options[keys[keys.length-1]] += " " + line;
                else curr.text += " " + line;
            }
        }
        if (curr) result.push(curr);
        return result;
    }

    // --- Logic ---
    function init() {
        const saved = localStorage.getItem('gdpr_quiz_data');
        document.getElementById('raw-input').value = saved || demoData;
        
        if (!saved) {
            toggleView('setup');
        } else {
            startQuiz();
        }
        
        // Theme check
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    }

    function toggleView(view) {
        document.getElementById('setup-area').className = view === 'setup' ? 'active' : '';
        document.getElementById('quiz-area').className = view === 'quiz' ? 'active' : '';
        document.getElementById('result-area').className = view === 'result' ? 'active' : '';
        
        if (view === 'setup') {
            document.getElementById('setup-area').classList.add('card');
        }
    }

    function loadDemo() {
        document.getElementById('raw-input').value = demoData;
    }

    function startQuiz() {
        const raw = document.getElementById('raw-input').value;
        if (!raw.trim()) return alert("内容不能为空");
        
        questions = parseText(raw);
        if (questions.length === 0) return alert("无法识别题目，请检查格式");
        
        localStorage.setItem('gdpr_quiz_data', raw);
        currentIndex = 0;
        answers = {};
        
        document.getElementById('parse-status').innerText = `✅ 已加载 ${questions.length} 道题目`;
        setTimeout(() => {
            toggleView('quiz');
            renderQuestion();
        }, 500);
    }

    function renderQuestion() {
        const q = questions[currentIndex];
        const userAnswer = answers[currentIndex];
        
        // Scenario
        const sBox = document.getElementById('scenario-box');
        if (q.scenario) {
            sBox.style.display = 'block';
            sBox.innerText = q.scenario;
        } else {
            sBox.style.display = 'none';
        }

        // Text
        document.getElementById('question-text').innerText = `${q.id}. ${q.text}`;
        document.getElementById('progress-text').innerText = `题目 ${currentIndex + 1} / ${questions.length}`;
        
        // Progress bar
        const pct = ((currentIndex + 1) / questions.length) * 100;
        document.getElementById('progress-fill').style.width = `${pct}%`;

        // Options
        const cont = document.getElementById('options-container');
        cont.innerHTML = '';
        ['A','B','C','D'].forEach(opt => {
            if (!q.options[opt]) return;
            const div = document.createElement('div');
            div.className = 'option';
            if (userAnswer) {
                div.classList.add('disabled');
                if (opt === q.answer) div.classList.add('correct');
                if (opt === userAnswer && opt !== q.answer) div.classList.add('wrong');
                if (opt === userAnswer) div.classList.add('selected');
            }
            
            div.onclick = () => handleAnswer(opt);
            div.innerHTML = `<span class="option-tag">${opt}.</span><span>${q.options[opt]}</span>`;
            cont.appendChild(div);
        });

        // Explanation
        const expBox = document.getElementById('explanation-box');
        if (userAnswer) {
            expBox.classList.add('show');
            document.getElementById('answer-display').innerText = userAnswer === q.answer ? "✅ 回答正确" : `❌ 回答错误，正确答案是 ${q.answer}`;
            document.getElementById('explanation-text').innerText = q.explanation.trim() || "暂无详细解析";
        } else {
            expBox.classList.remove('show');
        }

        // Nav buttons
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        document.getElementById('next-btn').innerText = currentIndex === questions.length - 1 ? "完成 & 交卷" : "下一题 ➡️";
        
        calcStats();
    }

    function handleAnswer(opt) {
        if (answers[currentIndex]) return;
        answers[currentIndex] = opt;
        renderQuestion();
    }

    function changeQuestion(delta) {
        const next = currentIndex + delta;
        if (next >= 0 && next < questions.length) {
            currentIndex = next;
            renderQuestion();
        } else if (delta > 0 && next === questions.length) {
            showResults();
        }
    }

    function calcStats() {
        let correct = 0;
        let answered = 0;
        Object.keys(answers).forEach(idx => {
            answered++;
            if (answers[idx] === questions[idx].answer) correct++;
        });
        const rate = answered === 0 ? 0 : Math.round((correct / answered) * 100);
        document.getElementById('current-accuracy').innerText = `${rate}%`;
        return { correct, answered, rate };
    }

    function showResults() {
        toggleView('result');
        const stats = calcStats();
        const total = questions.length;
        const wrong = stats.answered - stats.correct;
        
        // Animate Score
        const circle = document.getElementById('final-score-circle');
        // CSS conic-gradient logic
        setTimeout(() => {
            circle.style.background = `conic-gradient(var(--primary) ${stats.rate}%, var(--border) 0%)`;
        }, 100);
        document.getElementById('final-score-number').innerText = `${stats.rate}%`;

        document.getElementById('res-total').innerText = total;
        document.getElementById('res-correct').innerText = stats.correct;
        document.getElementById('res-wrong').innerText = wrong;
        document.getElementById('res-unanswered').innerText = total - stats.answered;
    }

    function restartQuiz() {
        if (confirm("确定要清空进度重新开始吗？")) {
            currentIndex = 0;
            answers = {};
            toggleView('quiz');
            renderQuestion();
        }
    }

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    window.onload = init;
</script>
</body>
</html>
